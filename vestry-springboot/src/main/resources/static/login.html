<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VESTRY — Acceder</title>
  <link rel="stylesheet" href="style.css">
  <style>
    html, body { overflow: auto; }
    .login-root {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: rgba(16, 16, 24, 0.85);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 28px;
      padding: 40px 36px 36px;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.08) inset,
        0 32px 80px rgba(0,0,0,0.6),
        0 0 0 0.5px rgba(255,255,255,0.04);
    }
    .login-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      color: var(--accent-primary);
      letter-spacing: 6px;
      text-align: center;
      margin-bottom: 32px;
    }
    .login-card h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 300;
      margin-bottom: 6px;
    }
    .login-card > p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 28px;
    }
    .login-avatar-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 24px;
    }
    .login-avatar-ring {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 1.5px solid var(--accent-primary);
      background: var(--glass-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .login-avatar-ring:hover { box-shadow: 0 0 20px var(--accent-glow); }
    .login-avatar-ring img {
      width: 100%; height: 100%; object-fit: cover;
      display: none;
    }
    .login-avatar-ring .av-icon { font-size: 30px; color: var(--text-muted); }
    .login-avatar-ring .av-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .login-avatar-ring:hover .av-overlay { opacity: 1; }
    .login-avatar-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .login-processing {
      text-align: center;
      padding: 8px 0;
      display: none;
    }
  </style>
</head>
<body>

<div id="orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div id="toast-container"></div>

<div class="login-root">
  <div class="login-card">
    <div class="login-logo">VESTRY</div>
    <h2>Bienvenido a VESTRY</h2>
    <p>Tu armario digital inteligente. Crea tu perfil para comenzar.</p>

    <div class="login-avatar-zone">
      <div class="login-avatar-ring" id="login-avatar-btn">
        <span class="av-icon">📷</span>
        <img id="login-avatar-img" alt="avatar">
        <div class="av-overlay">📷</div>
      </div>
      <span class="login-avatar-hint">Foto de perfil (opcional)</span>
      <input type="file" id="login-avatar-file" accept="image/*" style="display:none;">
    </div>

    <div class="login-processing" id="login-processing">
      <div class="processing-bar">
        <div class="processing-spinner"></div>
        <span>Procesando avatar...</span>
      </div>
    </div>

    <div class="form-group">
      <label>Nombre</label>
      <input class="form-input" id="login-name" placeholder="¿Cómo te llamas?" autocomplete="name">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input class="form-input" id="login-email" type="email" placeholder="tu@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input class="form-input" id="login-password" type="password" placeholder="Tu contraseña" autocomplete="current-password">
    </div>

    <button class="btn-primary" id="btn-login-submit" style="width:100%;justify-content:center;margin-top:12px;">
      Abrir mi closet →
    </button>

    <p style="text-align:center;margin-top:16px;font-size:12px;color:var(--text-muted);">
      Si ya tienes cuenta, ingresa tu email y contraseña. Si eres nuevo, se creará tu cuenta.
    </p>
  </div>
</div>

<script type="module" src="login.js"></script>
</body>
</html>
